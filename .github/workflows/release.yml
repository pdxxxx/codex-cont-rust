name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          New-Item -ItemType Directory -Path dist/INSTALL-GUIDE-AGENT | Out-Null
          Copy-Item target/release/codex-cont.exe dist/
          Copy-Item README.md, README_zh.md, config.example.toml dist/
          Copy-Item INSTALL-GUIDE-AGENT/AGENT.md dist/INSTALL-GUIDE-AGENT/
          Compress-Archive -Path dist/* -DestinationPath codex-cont-windows-x64.zip -Force

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release create $env:TAG codex-cont-windows-x64.zip --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $env:TAG --notes "Windows x64 release"
